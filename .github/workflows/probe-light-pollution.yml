name: Probe light pollution source

# Verifies the Falchi 2016 world-atlas GeoTIFF (GFZ Data Services, CC BY-NC 4.0)
# is reachable and reads its header WITHOUT downloading 2.9 GB — the "verify
# before building" step before the real light-pollution ingest is written.
# Dispatch via MCP actions_run_trigger.

on:
  workflow_dispatch:

concurrency:
  group: probe-lp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Install GDAL
        run: sudo apt-get update -qq && sudo apt-get install -y -qq gdal-bin
      - name: Resolve download URLs from DataCite
        run: node scripts/resolve-falchi-url.mjs | tee urls.txt
      - name: HEAD + gdalinfo each candidate (no full download)
        run: |
          while read -r URL; do
            [ -z "$URL" ] && continue
            echo "=================================================="
            echo "Candidate: $URL"
            curl -sS -I -L --max-time 120 "$URL" | grep -iE 'content-length|content-type|HTTP/|location' || true
            echo "--- gdalinfo /vsicurl ---"
            gdalinfo "/vsicurl/$URL" 2>&1 | head -40 || true
            echo "--- gdalinfo /vsizip/vsicurl (if archive) ---"
            gdalinfo "/vsizip//vsicurl/$URL" 2>&1 | head -15 || true
          done < urls.txt
