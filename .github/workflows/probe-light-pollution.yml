name: Probe light pollution source

# Verifies the Falchi 2016 world-atlas GeoTIFF (GFZ Data Services, CC BY-NC 4.0)
# is reachable and reads its header WITHOUT downloading 2.9 GB — the "verify
# before building" step before the real light-pollution ingest is written.
# Dispatch via MCP actions_run_trigger.

on:
  workflow_dispatch:

concurrency:
  group: probe-lp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Install GDAL
        run: sudo apt-get update -qq && sudo apt-get install -y -qq gdal-bin
      - name: Resolve download URL from DOI
        id: resolve
        run: |
          node scripts/resolve-falchi-url.mjs | tee urls.txt
          echo "url=$(head -1 urls.txt)" >> "$GITHUB_OUTPUT"
      - name: Read GeoTIFF header via /vsicurl (no full download)
        run: |
          URL='${{ steps.resolve.outputs.url }}'
          echo "Probing: $URL"
          # HEAD for size + type
          curl -sS -I -L --max-time 120 "$URL" | grep -iE 'content-length|content-type|HTTP/' || true
          # gdalinfo reads only the TIFF header/IFD via HTTP range requests
          gdalinfo "/vsicurl/$URL" 2>&1 | head -60 || echo "gdalinfo failed on /vsicurl (may need /vsizip/ or full download)"
