name: Deploy

# main -> production (photo-pointer.pages.dev)
# staging -> Cloudflare preview deployment
# Skips gracefully until the Cloudflare secrets exist.

on:
  push:
    branches: [main, staging]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref_name == 'main' || github.ref_name == 'staging'
    steps:
      - uses: actions/checkout@v5
      - name: Check Cloudflare secrets
        id: cf
        env:
          TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$TOKEN" ] && [ -n "$ACCOUNT" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare secrets not configured yet - skipping deploy."
          fi
      # Create the Pages project if it does not exist yet (first deploy).
      # continue-on-error so an "already exists" response never fails the run
      # — this is what stops the repeated failure notifications.
      - name: Ensure Pages project exists
        if: steps.cf.outputs.ready == 'true'
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create photo-pointer --production-branch=main
      - name: Deploy to Cloudflare Pages
        if: steps.cf.outputs.ready == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=photo-pointer --branch=${{ github.ref_name }} --commit-dirty=true
