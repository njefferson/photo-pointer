name: Ingest OSM

# Fetches OpenStreetMap data (Overpass) for a region, adds eBird hotspots +
# historical markers, merges + validates, and commits. Runs on a GitHub runner
# because Overpass is unreachable from Claude session sandboxes.
#
# Pick the region with the `region` dispatch input (an id from
# config/regions.json; default = the home region). Fire via workflow_dispatch
# (MCP actions_run_trigger) or by committing to .github/trigger/ingest-osm.

on:
  workflow_dispatch:
    inputs:
      region:
        description: Region id (see config/regions.json)
        default: sac-eldorado-placer
  push:
    paths:
      - '.github/trigger/ingest-osm'

concurrency:
  group: ingest-osm-${{ github.ref }}-${{ github.event.inputs.region || 'default' }}
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
    env:
      REGION: ${{ github.event.inputs.region || 'sac-eldorado-placer' }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Probe Overpass reachability
        run: node ingest/ingest.mjs probe
      - name: Fetch OSM + eBird + markers, merge + validate
        run: node ingest/ingest.mjs all "$REGION"
      - name: Commit data
        run: |
          git config user.name "photo-pointer ingest"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then echo "No data changes."; exit 0; fi
          git commit -m "Refresh map data for the $REGION region"
          for i in 1 2 3 4 5; do git pull --rebase && git push && break; sleep $((i * 5)); done
